events {
    worker_connections 1024;
}

http {
    # Logging Configuration
    log_format canary '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream: $upstream_addr ($canary_target)';
    access_log /var/log/nginx/access.log canary;
    error_log /var/log/nginx/error.log warn;

    # Split clients creates a variable $canary_target based on a hash of the Request ID
    # This allows 90% of traffic to go to 'orchestrator_blue' and 10% to 'orchestrator_green'
    split_clients "${http_x_request_id}${remote_addr}" $canary_target {
        90%     orchestrator_blue;
        *       orchestrator_green;
    }

    # Upstream groups
    upstream orchestrator_blue {
        server vbgw-orchestrator-blue:8080 max_fails=3 fail_timeout=5s;
    }

    upstream orchestrator_green {
        server vbgw-orchestrator-green:8080 max_fails=3 fail_timeout=5s;
    }

    # Internal Mapping to dynamically select upstream port
    map $canary_target $upstream_dest {
        orchestrator_blue   http://orchestrator_blue;
        orchestrator_green  http://orchestrator_green;
    }

    server {
        listen 80;
        server_name proxy.vbgw.internal;
        
        # FreeSWITCH XML Curl Post Route
        location /api/v1/fs/dialplan {
            proxy_pass $upstream_dest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Fast timeouts since dialplan routing must be instant
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Catch-All API Proxy
        location / {
            proxy_pass $upstream_dest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Normal timeouts
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
        }
    }
}
