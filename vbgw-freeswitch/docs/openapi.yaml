openapi: "3.0.3"
info:
  title: VBGW Orchestrator API
  description: |
    VoiceBot Gateway (VBGW) v2 — Orchestrator REST API 명세서.
    FreeSWITCH ESL을 통한 통화 생성, 제어, 녹취, 모니터링, 관리 기능을 제공합니다.
  version: "1.2.0"
  contact:
    name: VBGW Engineering
servers:
  - url: http://localhost:8080
    description: 로컬 개발 환경
  - url: http://orchestrator.vbgw.internal:8080
    description: 내부 클러스터

security:
  - BearerAuth: []

tags:
  - name: Health
    description: 헬스 체크 및 Readiness Probe
  - name: Calls
    description: 통화 생성 (아웃바운드)
  - name: Control
    description: 통화 제어 (DTMF, Transfer, Record, Bridge 등)
  - name: Stats
    description: 통화 통계 조회
  - name: Admin
    description: 관제 대시보드용 관리 API
  - name: Internal
    description: FreeSWITCH / Bridge 전용 내부 엔드포인트

paths:
  /live:
    get:
      tags: [Health]
      summary: Liveness Probe
      security: []
      responses:
        "200":
          description: 서비스 동작 중
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /ready:
    get:
      tags: [Health]
      summary: Readiness Probe
      security: []
      responses:
        "200":
          description: 트래픽 수신 준비 완료
        "503":
          description: 아직 준비되지 않음

  /health:
    get:
      tags: [Health]
      summary: 상세 헬스 체크 (컴포넌트별 상태)
      responses:
        "200":
          description: 정상
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/calls:
    post:
      tags: [Calls]
      summary: 아웃바운드 콜 생성
      description: FreeSWITCH ESL originate를 통해 SIP 아웃바운드 콜을 시작합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallRequest"
      responses:
        "201":
          description: 콜 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCallResponse"
        "400":
          description: 잘못된 요청 (target_uri 누락 등)
        "503":
          description: 용량 초과 (MAX_SESSIONS 한도)

  /api/v1/calls/{id}/dtmf:
    post:
      tags: [Control]
      summary: DTMF 전송
      parameters:
        - $ref: "#/components/parameters/CallID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [digits]
              properties:
                digits:
                  type: string
                  pattern: "^[0-9*#A-D]{1,20}$"
                  example: "1234"
      responses:
        "200":
          description: DTMF 전송 성공
        "404":
          description: 세션 없음

  /api/v1/calls/{id}/transfer:
    post:
      tags: [Control]
      summary: 콜 전환 (Blind Transfer)
      parameters:
        - $ref: "#/components/parameters/CallID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
                  example: "sip:agent@pbx.internal"
      responses:
        "200":
          description: 전환 성공
        "404":
          description: 세션 없음

  /api/v1/calls/{id}/attended-transfer:
    post:
      tags: [Control]
      summary: 상담형 콜 전환 (Attended Transfer)
      parameters:
        - $ref: "#/components/parameters/CallID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
      responses:
        "200":
          description: 전환 시작
        "404":
          description: 세션 없음

  /api/v1/calls/{id}/record/start:
    post:
      tags: [Control]
      summary: 녹취 시작
      parameters:
        - $ref: "#/components/parameters/CallID"
      responses:
        "200":
          description: 녹취 시작됨
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "recording"
                  path:
                    type: string
                    example: "/recordings/uuid.wav"
        "404":
          description: 세션 없음

  /api/v1/calls/{id}/record/stop:
    post:
      tags: [Control]
      summary: 녹취 중지
      parameters:
        - $ref: "#/components/parameters/CallID"
      responses:
        "200":
          description: 녹취 중지됨
        "404":
          description: 세션 없음

  /api/v1/calls/{id}/eavesdrop:
    post:
      tags: [Control]
      summary: 슈퍼바이저 감청
      parameters:
        - $ref: "#/components/parameters/CallID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supervisor_uuid]
              properties:
                supervisor_uuid:
                  type: string
      responses:
        "200":
          description: 감청 시작

  /api/v1/calls/{id}/stats:
    get:
      tags: [Stats]
      summary: 개별 콜 통계 조회
      parameters:
        - $ref: "#/components/parameters/CallID"
      responses:
        "200":
          description: 통계 데이터
        "404":
          description: 세션 없음

  /api/v1/calls/bridge:
    post:
      tags: [Control]
      summary: 두 통화 브릿지 연결
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [call_id_1, call_id_2]
              properties:
                call_id_1:
                  type: string
                call_id_2:
                  type: string
      responses:
        "200":
          description: 브릿지 성공

  /api/v1/calls/unbridge:
    post:
      tags: [Control]
      summary: 브릿지 해제
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [call_id_1, call_id_2]
              properties:
                call_id_1:
                  type: string
                call_id_2:
                  type: string
      responses:
        "200":
          description: 브릿지 해제 성공

  /api/v1/admin/sessions/active:
    get:
      tags: [Admin]
      summary: 활성 세션 목록 조회 (클러스터 관제)
      responses:
        "200":
          description: 세션 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionsResponse"

  /api/v1/fs/dialplan:
    post:
      tags: [Internal]
      summary: FreeSWITCH mod_xml_curl 동적 다이얼플랜
      security: []
      description: FreeSWITCH가 콜 수신 시 자동으로 호출하는 내부 엔드포인트 (Loopback Only)
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Hunt-Context:
                  type: string
                Caller-Destination-Number:
                  type: string
                Caller-Caller-ID-Number:
                  type: string
      responses:
        "200":
          description: FreeSWITCH XML Dialplan
          content:
            text/xml:
              schema:
                type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: ADMIN_API_KEY 값을 Bearer 토큰으로 전달

  parameters:
    CallID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 세션/콜 ID (UUID)

  schemas:
    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        components:
          type: object
          properties:
            esl:
              type: string
            bridge:
              type: string
            active_calls:
              type: integer

    CreateCallRequest:
      type: object
      required: [target_uri]
      properties:
        target_uri:
          type: string
          description: SIP URI of the call destination
          example: "sip:1004@proxy.internal"
        caller_id:
          type: string
          description: 발신자 Caller-ID
          example: "800-VBGW"

    CreateCallResponse:
      type: object
      properties:
        call_id:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        status:
          type: string
          example: "initiating"

    ActiveSessionsResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        count:
          type: integer
          example: 3
        data:
          type: array
          items:
            type: object
            properties:
              session_id:
                type: string
              node_id:
                type: string
              fs_uuid:
                type: string
              caller_id:
                type: string
              dest_num:
                type: string
              is_ai_paused:
                type: boolean
              created_at:
                type: string
                format: date-time
